<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to Papa Jerry</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<script src="people.js"></script>
<style>
  :root {
    --cream: #fdf6e3;
    --brown: #8B5E3C;
    --brown-light: #c49a6c;
    --brown-dark: #5c3d1e;
    --accent: #e8845a;
    --accent-hover: #d46940;
    --text: #3d2b1f;
    --shadow: rgba(92, 61, 30, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(196,154,108,0.13) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 90%, rgba(232,132,90,0.10) 0%, transparent 60%);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0px 12px 20px;
    gap: 8px;
  }

  .photo-frame {
    width: 220px;
    height: 260px;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid var(--brown);
    box-shadow: 0 6px 20px var(--shadow);
    flex-shrink: 0;
    position: relative;
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0; left: 0;
  }

  #img-closed { opacity: 1; }
  #img-open   { opacity: 0; }

  .photo-caption {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--brown);
    text-align: center;
  }

  .card {
    width: 100%;
    max-width: 700px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 32px var(--shadow);
    padding: 14px 20px 20px;
    border: 2px solid rgba(139,94,60,0.12);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* RESPONSE AREA */
  .response-box {
    width: 100%;
    min-height: 80px;
    background: var(--cream);
    border: 2px solid var(--brown-light);
    border-radius: 12px;
    padding: 14px;
    font-size: 1rem;
    line-height: 1.6;
    color: var(--text);
    font-style: italic;
    display: none;
  }

  .response-box.visible { display: block; }

  .response-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.88rem;
    color: var(--brown);
    display: none;
  }

  .response-label.visible { display: block; }

  textarea {
    width: 100%;
    min-height: 120px;
    border: 2px solid var(--brown-light);
    border-radius: 12px;
    padding: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: var(--text);
    background: var(--cream);
    resize: vertical;
    outline: none;
    transition: border-color 0.18s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }

  .btn-talk {
    width: 100%;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 12px;
    border: none;
    border-radius: 50px;
    background: var(--accent);
    color: white;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 3px 10px var(--shadow);
  }

  .btn-talk:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }

  .btn-talk:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    text-align: center;
    font-size: 0.9rem;
    font-weight: 600;
    min-height: 24px;
    color: var(--brown-light);
  }

  .status.active { color: var(--accent); }

  .offline-notice {
    padding: 14px 18px;
    background: rgba(139,94,60,0.08);
    border-radius: 12px;
    font-size: 0.85rem;
    color: var(--brown);
    text-align: center;
    line-height: 1.6;
    display: none;
  }

  .offline-notice.visible { display: block; }
</style>
</head>
<body>

<div class="photo-caption">Papa Jerry 🐻</div>
<div class="photo-frame">
  <img id="img-closed" src="mouth_closed.jpg" alt="Papa Jerry">
  <img id="img-open"   src="mouth_open.jpg"   alt="Papa Jerry talking">
</div>

<div class="card">
  <div class="response-label" id="response-label">Papa Jerry says:</div>
  <div class="response-box"   id="response-box"></div>
  <textarea id="text-input" placeholder="Say something to Papa Jerry..."></textarea>
  <button class="btn-talk" id="btn-talk" onclick="handleTalk()">🐻 Talk to Papa Jerry</button>
  <div class="status" id="status"></div>
  <div class="offline-notice" id="offline-notice">
    Papa Jerry is not available right now.<br>
    Please check back later when a session is active.
  </div>
</div>

<script>
  var TUNNEL_URL_RAW = 'https://raw.githubusercontent.com/zaksix6/omnivoice-clone/main/tunnel_url.txt';
  var tunnelUrl = null;
  var conversationHistory = [];

  // ── LIP SYNC ──
  var imgClosed  = document.getElementById('img-closed');
  var imgOpen    = document.getElementById('img-open');
  var audioCtx   = null;
  var analyser   = null;
  var dataArray  = null;
  var mouthOpen  = false;
  var lastSpoken = 0;
  var COOLDOWN_MS = 120;
  var animRunning = false;

  function initAudioContext() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
  }

  function connectAudioElement(audioEl) {
    initAudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    var source = audioCtx.createMediaElementSource(audioEl);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    if (!animRunning) { animRunning = true; drawLoop(); }
  }

  function drawLoop() {
    requestAnimationFrame(drawLoop);
    if (!analyser) return;
    analyser.getByteTimeDomainData(dataArray);
    var total = 0;
    for (var i = 0; i < dataArray.length; i++) {
      var norm = (dataArray[i] - 128) / 128;
      total += norm * norm;
    }
    var rms = Math.sqrt(total / dataArray.length);
    if (rms > 0.04) { mouthOpen = true; lastSpoken = Date.now(); }
    else if (Date.now() - lastSpoken > COOLDOWN_MS) { mouthOpen = false; }
    imgClosed.style.opacity = mouthOpen ? '0' : '1';
    imgOpen.style.opacity   = mouthOpen ? '1' : '0';
  }

  // ── UTILITIES ──
  function setStatus(msg, type) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  function showOffline(show) {
    document.getElementById('offline-notice').className = 'offline-notice' + (show ? ' visible' : '');
  }

  function showResponse(text) {
    document.getElementById('response-box').textContent = text;
    document.getElementById('response-box').className = 'response-box visible';
    document.getElementById('response-label').className = 'response-label visible';
  }

  function splitSentences(text) {
    var parts = text.match(/[^.!?:]+[.!?:]+/g) || [];
    var joined = parts.join('');
    var remainder = text.slice(joined.length).trim();
    if (remainder.length > 0) parts.push(remainder);
    if (parts.length === 0) return [text.trim()];
    return parts.map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
  }

  function getTunnelUrl(callback) {
    fetch(TUNNEL_URL_RAW + '?nocache=' + Date.now())
      .then(function(r) { return r.text(); })
      .then(function(text) {
        var url = text.trim();
        if (url && url.startsWith('http')) {
          tunnelUrl = url; showOffline(false); callback(true);
        } else {
          tunnelUrl = null; showOffline(true); callback(false);
        }
      })
      .catch(function() { tunnelUrl = null; showOffline(true); callback(false); });
  }

  function generateAudio(sentence, callback) {
    var controller = new AbortController();
    var timeout = setTimeout(function() { controller.abort(); }, 30000);
    fetch(tunnelUrl + '/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: sentence }),
      signal: controller.signal
    })
    .then(function(r) { clearTimeout(timeout); return r.blob(); })
    .then(function(blob) { callback(URL.createObjectURL(blob)); })
    .catch(function() {
      clearTimeout(timeout);
      tunnelUrl = null;
      showOffline(true);
      setStatus('', '');
      document.getElementById('btn-talk').disabled = false;
      callback(null);
    });
  }

  function speakText(text) {
    var sentences = splitSentences(text);
    var total = sentences.length;
    var generationDone = false;
    var playedCount = 0;
    var readyQueue = [];
    var isPlaying = false;

    function checkAllDone() {
      if (generationDone && playedCount >= total) {
        setStatus('', '');
        document.getElementById('btn-talk').disabled = false;
        document.getElementById('text-input').value = '';
      }
    }

    function playNextReady() {
      if (isPlaying || readyQueue.length === 0) return;
      var url = readyQueue.shift();
      if (url === null) { playedCount++; checkAllDone(); playNextReady(); return; }
      isPlaying = true;
      var audioEl = new Audio(url);
      audioEl.crossOrigin = 'anonymous';
      connectAudioElement(audioEl);
      audioEl.onended = function() {
        URL.revokeObjectURL(url);
        isPlaying = false;
        playedCount++;
        checkAllDone();
        playNextReady();
      };
      audioEl.onerror = function() {
        isPlaying = false; playedCount++; checkAllDone(); playNextReady();
      };
      setStatus('▶ Speaking...', 'active');
      audioEl.play().catch(function() {
        isPlaying = false; playedCount++; checkAllDone(); playNextReady();
      });
    }

    function generateNext(index) {
      if (index >= total) { generationDone = true; checkAllDone(); return; }
      generateAudio(sentences[index], function(url) {
        readyQueue.push(url);
        playNextReady();
        generateNext(index + 1);
      });
    }

    generateNext(0);
  }

  function handleTalk() {
    var text = document.getElementById('text-input').value.trim();
    if (!text) return;

    document.getElementById('btn-talk').disabled = true;
    setStatus('Thinking...', 'active');
    showOffline(false);

    getTunnelUrl(function(ok) {
      if (!ok) {
        setStatus('', '');
        document.getElementById('btn-talk').disabled = false;
        return;
      }

      // Call /chat endpoint
      fetch(tunnelUrl + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          people_data: peopleData,
          history: conversationHistory
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          setStatus('Error: ' + data.error, '');
          document.getElementById('btn-talk').disabled = false;
          return;
        }
        var reply = data.reply;

        // Show text immediately
        showResponse(reply);

        // Add to conversation history
        conversationHistory.push({ role: 'user', content: text });
        conversationHistory.push({ role: 'assistant', content: reply });

        // Keep history to last 10 exchanges to avoid prompt getting too long
        if (conversationHistory.length > 20) {
          conversationHistory = conversationHistory.slice(-20);
        }

        setStatus('Preparing voice...', 'active');

        // Now speak the response
        speakText(reply);
      })
      .catch(function() {
        setStatus('', '');
        document.getElementById('btn-talk').disabled = false;
        showOffline(true);
        tunnelUrl = null;
      });
    });
  }

  getTunnelUrl(function(ok) { if (!ok) setStatus('', ''); });
</script>

</body>
</html>
