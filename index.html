<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to Papa Jerry</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6e3;
    --brown: #8B5E3C;
    --brown-light: #c49a6c;
    --brown-dark: #5c3d1e;
    --accent: #e8845a;
    --accent-hover: #d46940;
    --text: #3d2b1f;
    --shadow: rgba(92, 61, 30, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(196,154,108,0.13) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 90%, rgba(232,132,90,0.10) 0%, transparent 60%);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 12px 32px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    width: 100%;
    max-width: 700px;
  }

  .photo-frame {
    width: 100px;
    height: 120px;
    border-radius: 14px;
    overflow: hidden;
    border: 3px solid var(--brown);
    box-shadow: 0 4px 12px var(--shadow);
    flex-shrink: 0;
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .header-text h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--brown-dark);
    line-height: 1.1;
  }

  .header-text p {
    font-size: 0.9rem;
    color: var(--brown-light);
    font-weight: 600;
    margin-top: 4px;
  }

  .card {
    width: 100%;
    max-width: 700px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 32px var(--shadow);
    padding: 28px;
    border: 2px solid rgba(139,94,60,0.12);
  }

  .instruction {
    font-size: 0.95rem;
    color: var(--brown-light);
    font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    border: 2px solid var(--brown-light);
    border-radius: 12px;
    padding: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: var(--text);
    background: var(--cream);
    resize: vertical;
    outline: none;
    transition: border-color 0.18s;
    line-height: 1.6;
  }

  textarea:focus { border-color: var(--accent); }

  .btn-speak {
    margin-top: 14px;
    width: 100%;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 12px;
    border: none;
    border-radius: 50px;
    background: var(--accent);
    color: white;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 3px 10px var(--shadow);
  }

  .btn-speak:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }

  .btn-speak:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .status {
    margin-top: 16px;
    text-align: center;
    font-size: 0.9rem;
    font-weight: 600;
    min-height: 24px;
    color: var(--brown-light);
  }

  .status.active { color: var(--accent); }
  .status.error { color: #c0392b; }

  .offline-notice {
    margin-top: 24px;
    padding: 14px 18px;
    background: rgba(139,94,60,0.08);
    border-radius: 12px;
    font-size: 0.85rem;
    color: var(--brown);
    text-align: center;
    line-height: 1.6;
    display: none;
  }

  .offline-notice.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="photo-frame">
    <img src="me.jpg" alt="Papa Jerry">
  </div>
  <div class="header-text">
    <h1>Talk to Papa Jerry</h1>
    <p>Type anything and hear it in Papa Jerry's voice 🐻</p>
  </div>
</div>

<div class="card">
  <div class="instruction">
    Type a sentence or a paragraph — Papa Jerry will read it back to you in his own voice.
  </div>
  <textarea id="text-input" placeholder="Type something here..."></textarea>
  <button class="btn-speak" id="btn-speak" onclick="handleSpeak()">▶ Speak</button>
  <div class="status" id="status"></div>
  <div class="offline-notice" id="offline-notice">
    Papa Jerry's live voice is not available right now.<br>
    Please check back later when a session is active.
  </div>
</div>

<script>
  var TUNNEL_URL_RAW = 'https://raw.githubusercontent.com/zaksix6/omnivoice-clone/main/tunnel_url.txt';
  var tunnelUrl = null;

  function setStatus(msg, type) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  function showOffline(show) {
    var el = document.getElementById('offline-notice');
    el.className = 'offline-notice' + (show ? ' visible' : '');
  }

  function splitSentences(text) {
    var parts = text.match(/[^.!?:]+[.!?:]+/g) || [];
    var joined = parts.join('');
    var remainder = text.slice(joined.length).trim();
    if (remainder.length > 0) parts.push(remainder);
    if (parts.length === 0) return [text.trim()];
    return parts.map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
  }

  function getTunnelUrl(callback) {
    fetch(TUNNEL_URL_RAW + '?nocache=' + Date.now())
      .then(function(r) { return r.text(); })
      .then(function(text) {
        var url = text.trim();
        if (url && url.startsWith('http')) {
          tunnelUrl = url;
          showOffline(false);
          callback(true);
        } else {
          tunnelUrl = null;
          showOffline(true);
          callback(false);
        }
      })
      .catch(function() {
        tunnelUrl = null;
        showOffline(true);
        callback(false);
      });
  }

  function generateAudio(sentence, callback) {
    fetch(tunnelUrl + '/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: sentence })
    })
    .then(function(r) { return r.blob(); })
    .then(function(blob) {
      callback(URL.createObjectURL(blob));
    })
    .catch(function() {
      callback(null);
    });
  }

  function handleSpeak() {
    var text = document.getElementById('text-input').value.trim();
    if (!text) return;

    document.getElementById('btn-speak').disabled = true;
    setStatus('Connecting...', 'active');
    showOffline(false);

    getTunnelUrl(function(ok) {
      if (!ok) {
        setStatus('', '');
        document.getElementById('btn-speak').disabled = false;
        return;
      }

      var sentences = splitSentences(text);
      var total = sentences.length;

      // Two counters - one for generation, one for playback
      var generatedCount = 0;
      var playedCount = 0;
      var generationDone = false;
      var readyQueue = [];  // URLs ready to play in order
      var isPlaying = false;

      function checkAllDone() {
        if (generationDone && playedCount >= total) {
          setStatus('', '');
          document.getElementById('btn-speak').disabled = false;
          document.getElementById('text-input').value = '';
        }
      }

      function playNextReady() {
        if (isPlaying) return;
        if (readyQueue.length === 0) return;
        var url = readyQueue.shift();
        if (url === null) {
          playedCount++;
          checkAllDone();
          playNextReady();
          return;
        }
        isPlaying = true;
        var audio = new Audio(url);
        audio.onended = function() {
          URL.revokeObjectURL(url);
          isPlaying = false;
          playedCount++;
          setStatus('▶ Speaking...', 'active');
          checkAllDone();
          playNextReady();
        };
        audio.onerror = function() {
          isPlaying = false;
          playedCount++;
          checkAllDone();
          playNextReady();
        };
        setStatus('▶ Speaking...', 'active');
        audio.play().catch(function() {
          isPlaying = false;
          playedCount++;
          checkAllDone();
          playNextReady();
        });
      }

      function generateNext(index) {
        if (index >= total) {
          generationDone = true;
          checkAllDone();
          return;
        }
        setStatus('Preparing ' + (index + 1) + ' of ' + total + '...', 'active');
        generateAudio(sentences[index], function(url) {
          generatedCount++;
          readyQueue.push(url);
          playNextReady();
          generateNext(index + 1);
        });
      }

      generateNext(0);
    });
  }

  getTunnelUrl(function(ok) {
    if (!ok) { setStatus('', ''); }
  });
</script>

</body>
</html>
