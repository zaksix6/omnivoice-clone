name: OmniVoice Server

on:
  workflow_dispatch:

jobs:
  serve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing --no-install-recommends ffmpeg

      - name: Install OmniVoice
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install omnivoice

      - name: Test CPU inference speed
        run: |
          python3 - <<'EOF'
          import time
          from omnivoice import OmniVoice
          import soundfile as sf
          print("Loading model...")
          t0 = time.time()
          model = OmniVoice.from_pretrained("k2-fsa/OmniVoice")
          print(f"Model loaded in {time.time()-t0:.1f}s")
          print("Generating audio...")
          t1 = time.time()
          audio = model.generate(
              text="Hello, this is a test of voice cloning on a CPU.",
              ref_audio="reference.wav",
          )
          elapsed = time.time()-t1
          sf.write("test_output.wav", audio[0], 24000)
          duration = len(audio[0]) / 24000
          print(f"Generated {duration:.1f}s of audio in {elapsed:.1f}s")
          print(f"Speed ratio: {duration/elapsed:.2f}x realtime")
          EOF
